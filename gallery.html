<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | Sam & Ari Kids Club</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:white;
animation:fadeIn 1s ease forwards;
opacity:0;
}

@keyframes fadeIn{to{opacity:1;}}

/* BACK ARROW */
.back{
padding:20px;
}
.back a{
text-decoration:none;
font-weight:700;
color:#ff4f6d;
font-size:1.2rem;
}

/* FLOATING SHAPES */
.floating-shape{
position:fixed;
border-radius:50%;
opacity:0.2;
z-index:0;
animation:floatMove 10s infinite ease-in-out;
pointer-events:none;
}
@keyframes floatMove{
0%{transform:translateY(0);}
50%{transform:translateY(-40px);}
100%{transform:translateY(0);}
}
.shape1{width:250px;height:250px;background:#ff4f6d;top:200px;left:-120px;}
.shape2{width:300px;height:300px;background:#4cc9f0;bottom:150px;right:-150px;}

h1{
text-align:center;
margin:40px 0;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
position:relative;
z-index:2;
}

.gallery img{
width:100%;
border-radius:20px;
transition:0.4s;
}
.gallery img:hover{transform:scale(1.05);}
</style>
</head>

<body>

<div class="floating-shape shape1"></div>
<div class="floating-shape shape2"></div>

<div class="back">
<a href="index.html">← Back to Home</a>
</div>

<h1>Our Gallery</h1>

<div class="gallery">
<img src="https://picsum.photos/500?random=11">
<img src="https://picsum.photos/500?random=12">
<img src="https://picsum.photos/500?random=13">
<img src="https://picsum.photos/500?random=14">
<img src="https://picsum.photos/500?random=15">
<img src="https://picsum.photos/500?random=16">
<img src="https://picsum.photos/500?random=17">
<img src="https://picsum.photos/500?random=18">
<img src="https://picsum.photos/500?random=19">
<img src="https://picsum.photos/500?random=20">
<img src="https://picsum.photos/500?random=21">
<img src="https://picsum.photos/500?random=22">
</div>

</body>
</html>
