<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | Sam & Ari Kids Club</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
  
<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:white;
animation:fadeIn 1s ease forwards;
opacity:0;
}

@keyframes fadeIn{to{opacity:1;}}

/* BACK ARROW */
.back{
padding:20px;
}
.back a{
text-decoration:none;
font-weight:700;
color:#ff4f6d;
font-size:1.2rem;
}

/* LIGHTBOX */
.lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
z-index:30000;
}

.lightbox img{
max-width:90%;
max-height:90%;
border-radius:20px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
position:relative;
z-index:2;
}

.gallery img{
width:100%;
border-radius:20px;
transition:0.4s;
}
.gallery img:hover{transform:scale(1.05);}
</style>
</head>

<body>

<div class="floating-shape shape1"></div>
<div class="floating-shape shape2"></div>

<div class="back">
<a href="index.html">← Back to Home</a>
</div>

<nav>
  <img src="logo.png" alt="Sam & Ari Logo">
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
  <ul id="menu">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="gallery.html">Gallery</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>
  
<h1>Our Gallery</h1>

<div class="gallery">
<img src="https://picsum.photos/500?random=11"onclick="openLightbox(this.src)">>
<img src="https://picsum.photos/500?random=12"onclick="openLightbox(this.src)">>
<img src="https://picsum.photos/500?random=13"onclick="openLightbox(this.src)">>
<img src="https://picsum.photos/500?random=14"onclick="openLightbox(this.src)">>
<img src="https://picsum.photos/500?random=15"onclick="openLightbox(this.src)">>
<img src="https://picsum.photos/500?random=16"onclick="openLightbox(this.src)">>
<img src="https://picsum.photos/500?random=17"onclick="openLightbox(this.src)">>
<img src="https://picsum.photos/500?random=18"onclick="openLightbox(this.src)">>
<img src="https://picsum.photos/500?random=19"onclick="openLightbox(this.src)">>
<img src="https://picsum.photos/500?random=20"onclick="openLightbox(this.src)">>
<img src="https://picsum.photos/500?random=21"onclick="openLightbox(this.src)">>
<img src="https://picsum.photos/500?random=22"onclick="openLightbox(this.src)">>
</div>

<script>
function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}
</script>
  
</body>
<div class="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>
  
</html>

<script>
function openLightbox(src){
document.getElementById("lightbox-img").src = src;
document.querySelector(".lightbox").style.display="flex";
}

function closeLightbox(){
document.querySelector(".lightbox").style.display="none";
}
</script>
