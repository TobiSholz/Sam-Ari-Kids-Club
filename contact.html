<!DOCTYPE html>
<html>
<head>
<title>Contact - Sam & Ari Kids Club</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
body{
font-family:'Poppins',sans-serif;
margin:0;
background:#fff;
}

section{
padding:120px 40px;
max-width:800px;
margin:auto;
}

h2{
text-align:center;
margin-bottom:30px;
}

form{
display:flex;
flex-direction:column;
gap:20px;
}

input, textarea{
padding:15px;
border-radius:12px;
border:1px solid #ddd;
font-family:'Poppins',sans-serif;
}

button{
padding:15px;
border:none;
border-radius:30px;
background:#ff4f6d;
color:white;
font-weight:600;
cursor:pointer;
}
</style>
</head>

<body>

<section>
<h2>Contact Us</h2>

<form action="mailto:hello@samandariclub.com" method="POST" enctype="text/plain">
<input type="text" name="Name" placeholder="Your Name" required>
<input type="email" name="Email" placeholder="Your Email" required>
<textarea name="Message" rows="5" placeholder="Your Message" required></textarea>
<button type="submit">Send Message</button>
</form>

</section>

</body>
</html>
